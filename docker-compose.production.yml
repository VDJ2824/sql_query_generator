# Deprecated production path.
# Kept for reference only. The current target architecture uses managed
# MongoDB Atlas, Neon PostgreSQL, and TiDB Cloud instead of Docker-managed DBs.
services:
  client:
    build:
      context: .
      dockerfile: client/Dockerfile.production
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    networks:
      - app-network

  server:
    build:
      context: .
      dockerfile: server/Dockerfile.production
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 5000
      SQL_SERVICE_URL: http://sql-service:8001
      CLIENT_URL: ${PUBLIC_ORIGIN}
    depends_on:
      - mongo
      - sql-service
    expose:
      - "5000"
    restart: unless-stopped
    networks:
      - app-network

  sql-service:
    build:
      context: .
      dockerfile: sql-service/Dockerfile.production
    environment:
      SQL_SERVICE_API_KEY: ${SQL_SERVICE_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL}
      POSTGRES_DEMO_URL: ${POSTGRES_APP_URL}
      MYSQL_DEMO_URL: ${MYSQL_APP_URL}
      MYSQL_SSL_CA_PATH: ${MYSQL_SSL_CA_PATH:-}
      POSTGRES_ADMIN_URL: ${POSTGRES_ADMIN_URL:-}
      MYSQL_ADMIN_URL: ${MYSQL_ADMIN_URL:-}
    depends_on:
      - postgres
      - mysql
    expose:
      - "8001"
    restart: unless-stopped
    networks:
      - app-network

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    expose:
      - "27017"
    networks:
      - app-network

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_BOOTSTRAP_DB}
      POSTGRES_USER: ${POSTGRES_BOOTSTRAP_USER}
      POSTGRES_PASSWORD: ${POSTGRES_BOOTSTRAP_PASSWORD}
      POSTGRES_APP_DB: ${POSTGRES_APP_DB}
      POSTGRES_APP_USER: ${POSTGRES_APP_USER}
      POSTGRES_APP_PASSWORD: ${POSTGRES_APP_PASSWORD}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "5432"
    networks:
      - app-network

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_APP_DATABASE}
      MYSQL_APP_USER: ${MYSQL_APP_USER}
      MYSQL_APP_PASSWORD: ${MYSQL_APP_PASSWORD}
      MYSQL_ADMIN_USER: ${MYSQL_ADMIN_USER}
      MYSQL_ADMIN_PASSWORD: ${MYSQL_ADMIN_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./deploy/mysql/init:/docker-entrypoint-initdb.d:ro
    expose:
      - "3306"
    networks:
      - app-network

volumes:
  mongo-data:
  postgres-data:
  mysql-data:

networks:
  app-network:
    driver: bridge
